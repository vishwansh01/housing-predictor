name: Deploy Backend to Hogging Face
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: 
          fetch-depth: 0
          lfs: true
      - name: Push Backend Subfolder to HF Space
        env: 
          HF_TOKEN: ${{secrets.HF_TOKEN}}
        run: |
          cd backend
          git init
          git checkout -b main
          git add .
          git config --global user.email "actions@github.com"
          git config --global user.name "Github Actions"
          git commit -m "Automated backend sync"
          git push --force https://vishwansh01:$HF_TOKEN@huggingface.co/spaces/vishwansh01/housing-api main
